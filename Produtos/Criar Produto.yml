info:
  name: Criar Produto
  type: http
  seq: 1

http:
  method: post
  url: http://localhost:8080/produtos
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "nome": "Notebook",
        "preco": 4500.00,
        "estoque": 10
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
