info:
  name: Criar Cliente
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:8080/clientes
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "nome": "João",
        "email": "joao@email.com"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
